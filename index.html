<!DOCTYPE = html>
<html>
    <head>
        <title>Guyer Golf</title>
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
    <div id="banner">
    <div id="Title-Logo">
        <button id="Logo-Button"></button>
    </div>
    <div id="banner-center">
    <span id="banner-text">Welcome To The Practice Room</span>
    <div class="practice-room-nav">
    <nav>
    <button class="nav-button">Home</button>
    <button class="nav-button">Practice Room</button>
    <button class="nav-button">Rotations</button>
    <button class="nav-button">Distance Inputs</button>
    <button class="nav-button">Speed Inputs</button>
</nav>
</div>
</div>
</div>


<div class="off-screen-menu">
    <button class="menu-button">Home</button>
    <button class="menu-button">Practice Room</button>
    <button class="menu-button">Rotations</button>
    <button class="menu-button">Distance Inputs</button>
    <button class="menu-button">Speed Inputs</button>
</div>
        <h2>Club Distance Averages</h2>

        <div id="table-wrapper">
        <table id="Averages">
            <tr class="Table-Header">
                <th>Club</th>
                <th>Distance Averages</th>
            </tr>
            <tr class="one"> 
                <td><button class="delete-row">X</button>one Iron</td>
                <td>P</td>
                </tr>
            
            <tr id="add-Club">
                <td colspan="2" id="Add-club"> 
                    <button class="add-club">+</button> 
                    <input type="text" class="club-input" placeholder="Club name...">
                </td>
            </tr>
        </table>
        </div>
        <script src="script.js"></script>
    </body>
</html>
